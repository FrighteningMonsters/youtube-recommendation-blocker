<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 300px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9f9f9;
      padding: 16px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .setting {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .label {
      font-size: 13px;
      font-weight: 600;
      color: #333;
    }

    .slider-group {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    input[type="range"] {
      flex: 1;
      height: 6px;
      cursor: pointer;
      accent-color: #065fd4;
    }

    .value-display {
      min-width: 32px;
      text-align: center;
      font-size: 14px;
      font-weight: 600;
      color: #065fd4;
    }

    .switch {
      display: inline-flex;
      align-items: center;
      position: relative;
    }

    .switch input {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .slider-switch {
      width: 40px;
      height: 20px;
      background: #ccc;
      border-radius: 20px;
      position: relative;
      transition: background 0.2s;
    }

    .slider-switch::after {
      content: '';
      position: absolute;
      width: 16px;
      height: 16px;
      left: 2px;
      top: 2px;
      background: #fff;
      border-radius: 50%;
      transition: left 0.2s;
      box-shadow: 0 1px 2px rgba(0,0,0,0.2);
    }

    .switch input:checked + .slider-switch {
      background: #065fd4;
    }

    .switch input:checked + .slider-switch::after {
      left: 22px;
    }

    button {
      padding: 10px 16px;
      border: none;
      border-radius: 6px;
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    .btn-clear {
      background: #dc2626;
      color: white;
    }

    .btn-clear:hover {
      background: #b91c1c;
    }

    .status {
      font-size: 12px;
      color: #666;
      padding: 8px;
      background: #f0f0f0;
      border-radius: 4px;
      text-align: center;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    .button-row button {
      flex: 1;
    }

    .btn-secondary {
      background: #4b5563;
      color: white;
    }

    .btn-secondary:hover {
      background: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="setting">
      <label class="label">Pause tracking</label>
      <label class="switch" style="margin-top:8px;">
        <input type="checkbox" id="pauseTrackingToggle">
        <span class="slider-switch"></span>
      </label>
    </div>
    <div class="setting">
      <label class="label">Pause blocking</label>
      <label class="switch" style="margin-top:8px;">
        <input type="checkbox" id="pauseBlockingToggle">
        <span class="slider-switch"></span>
      </label>
    </div>
    <div class="setting">
      <label class="label">Hide threshold</label>
      <div class="slider-group">
        <input type="range" id="thresholdSlider" min="1" max="20" value="5">
        <span class="value-display" id="thresholdValue">5</span>
      </div>
      <div class="status">Hide videos after you have seen them <span id="thresholdDisplay">6</span> <span id="thresholdUnit">times</span></div>
    </div>

    <div class="setting">
      <label class="label">Decay after</label>
      <div class="slider-group">
        <input type="range" id="decayDaysSlider" min="0" max="30" step="1" value="0">
        <span class="value-display" id="decayDaysValue">Disabled</span>
      </div>
      <div class="status" id="decayDaysDisplay">View counts never decay.</div>
    </div>

    <div class="setting">
      <button class="btn-clear" id="viewBlockedBtn" style="background: #065fd4;">View blocked videos</button>
    </div>

    <div class="setting">
      <button class="btn-clear" id="viewAllowlistBtn" style="background: #10b981;">View allowlist</button>
    </div>

    <div class="setting">
      <div class="button-row">
        <button class="btn-secondary" id="exportDataBtn">Export data</button>
        <button class="btn-secondary" id="importDataBtn">Import data</button>
      </div>
      <input type="file" id="dataImportInput" accept="application/json,.json" style="display:none;" />
      <div class="status" id="dataStatus"></div>
    </div>

    <div class="setting">
      <button class="btn-clear" id="clearBtn">Clear video counts</button>
      <div class="status" id="clearStatus"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
