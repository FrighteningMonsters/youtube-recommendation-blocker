<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 700px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f9f9f9;
      padding: 20px;
    }

    .container {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    h1 {
      font-size: 18px;
      color: #333;
    }

    .back-btn {
      padding: 8px 12px;
      background: #e5e7eb;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .back-btn:hover {
      background: #d1d5db;
    }

    .section {
      background: white;
      border: 1px solid #e5e7eb;
      border-radius: 8px;
      padding: 16px;
    }

    .section h2 {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-bottom: 12px;
    }

    .add-form {
      display: flex;
      gap: 8px;
      margin-bottom: 16px;
    }

    .add-form input {
      flex: 1;
      padding: 8px 12px;
      border: 1px solid #d1d5db;
      border-radius: 4px;
      font-size: 13px;
    }

    .add-form button {
      padding: 8px 12px;
      background: #065fd4;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .add-form button:hover {
      background: #0445a0;
    }

    .item-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
      max-height: 300px;
      overflow-y: auto;
    }

    .item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px;
      background: #f9fafb;
      border: 1px solid #e5e7eb;
      border-radius: 4px;
    }

    .item-text {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 0;
    }

    .item-name {
      font-size: 13px;
      font-weight: 600;
      color: #111827;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-id {
      font-size: 12px;
      font-family: monospace;
      color: #6b7280;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .item-remove {
      padding: 4px 8px;
      background: #fee2e2;
      color: #991b1b;
      border: none;
      border-radius: 3px;
      cursor: pointer;
      font-size: 12px;
      font-weight: 600;
    }

    .item-remove:hover {
      background: #fecaca;
    }

    .empty-state {
      text-align: center;
      padding: 20px;
      color: #999;
      font-size: 13px;
    }

    .button-row {
      display: flex;
      gap: 8px;
    }

    .button-row button {
      flex: 1;
    }

    .btn-secondary {
      padding: 8px 12px;
      background: #4b5563;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
    }

    .btn-secondary:hover {
      background: #374151;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>Allowlist</h1>
      <button class="back-btn" id="backBtn">← Back</button>
    </div>

    <div class="section">
      <h2>Backup</h2>
      <div class="button-row">
        <button class="btn-secondary" id="exportDataBtn">Export data</button>
        <button class="btn-secondary" id="importDataBtn">Import data</button>
      </div>
      <input type="file" id="dataImportInput" accept="application/json,.json" style="display:none;" />
      <div class="empty-state" id="dataStatus" style="padding: 12px 0 0;">Export or import all extension data here.</div>
    </div>

    <div class="section">
      <h2>Allowlisted Videos</h2>
      <div class="add-form">
        <input type="text" id="videoInput" placeholder="Paste video ID here (found in YouTube URL as 'v=xxxxx')" />
        <button id="addVideoBtn">Add video</button>
      </div>
      <div class="item-list" id="videoList">
        <div class="empty-state">No allowlisted videos</div>
      </div>
    </div>

    <div class="section">
      <h2>Allowlisted Channels</h2>
      <div class="add-form">
        <input type="text" id="channelInput" placeholder="Paste channel ID here (from channel URL as '@channelname' or 'channel/UCxxxxx')" />
        <button id="addChannelBtn">Add channel</button>
      </div>
      <div class="item-list" id="channelList">
        <div class="empty-state">No allowlisted channels</div>
      </div>
    </div>
  </div>

  <script src="allowlist-manager.js"></script>
</body>
</html>
